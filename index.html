<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro para el examen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registro para el examen</h1>
        <form id="registro" action="Formulario.html">
            <label for="nombre">Nombre y apellido:</label>
            <input type="text" id="nombre">
            <label for="correo">Tarjeta de credito:</label>
            <input type="number" id="tarjeta">
            <label for="correo">CVV:</label>
            <input type="number" id="cvv">
            <label for="correo">Fecha de vencimiento:</label>
            <input type="date" id="fecha">

            <button class="boton" type="submit">Enviar</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
